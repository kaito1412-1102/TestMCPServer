name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        run: |
          git diff --unified=0 origin/${{ github.base_ref }} > pr.diff
          echo "Diff size:"
          wc -l pr.diff

      - name: Send diff to Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr.diff)

          jq -n --arg diff "$DIFF_CONTENT" '{
            contents: [{
              role: "user",
              parts: [{
                text: "You are a senior Android engineer reviewing a pull request. Review this code diff and suggest improvements. Focus on bugs, code smells, performance issues, and Android best practices.\n\n\($diff)"
              }]
            }]
          }' > body.json

          curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST \
            -d @body.json > review.json

          echo "Gemini response:"
          cat review.json

      - name: Extract review text
        id: extract
        run: |
          REVIEW=$(jq -r '.candidates[0].content.parts[0].text' review.json)

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment review on PR
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.extract.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **AI Code Review (Gemini)**\n\n" + review
            });