name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Get Kotlin diff only
        run: |
          git diff -U0 \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '*.kt' > pr.diff

          echo "Diff lines:"
          wc -l pr.diff

      - name: Send diff to Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr.diff)

          jq -n --arg diff "$DIFF_CONTENT" '{
            contents: [{
              role: "user",
              parts: [{
                text: "You are a senior Android engineer reviewing a pull request.\n\nOnly review changed Kotlin code.\nReturn ONLY JSON array like:\n[{\"file\":\"path/file.kt\",\"line\":10,\"comment\":\"issue\"}]\n\nReview this diff:\n\n\($diff)"
              }]
            }]
          }' > body.json

          curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST \
            -d @body.json > review_raw.json

      - name: Extract AI review JSON
        run: |
          jq -r '.candidates[0].content.parts[0].text' review_raw.json > review.json
          echo "AI review:"
          cat review.json

      - name: Create inline comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs")

            let text = fs.readFileSync("review.json", "utf8")

            // remove ```json ``` wrappers if present
            text = text.replace(/```json/g, "").replace(/```/g, "").trim()

            let comments = []

            try {
              comments = JSON.parse(text)
            } catch (e) {
              console.log("Invalid JSON from AI")
              console.log(text)
              return
            }

            const formatted = comments.map(c => ({
              path: c.file,
              line: c.line,
              body: "🤖 **AI Kotlin Review**\n\n" + c.comment
            }))

            if (formatted.length === 0) {
              console.log("No comments")
              return
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              comments: formatted
            })